<div class="cs-home">
<div class="cs-home-main">
{{{index}}}
</div>
<aside class="cs-home-aside">
{{#sidebar}}
{{{.}}}

<script>
(function () {
  var home = document.querySelector('.cs-home');
  if (!home) return;
  var hero = home.querySelector('.cs-home-main > .cs-hero');
  if (hero) { home.insertBefore(hero, home.firstChild); home.classList.add('cs-home-hero-out'); }
})();
</script>
